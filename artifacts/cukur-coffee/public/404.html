<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Çukur Coffee</title>
  <script>
    // GitHub Pages SPA redirect for https://cukur-cofee.github.io/biskra/
    var pathArray = window.location.pathname.split('/').filter(Boolean);
    var repoIndex = pathArray.indexOf('biskra');
    
    // Extract the route after /biskra/
    var route = '/' + pathArray.slice(repoIndex + 1).join('/');
    
    // Redirect to index.html with the route preserved
    window.location.replace(
      '/biskra/?p=' + encodeURIComponent(route) +
      (window.location.search ? '&q=' + window.location.search.slice(1) : '') +
      window.location.hash
    );
  </script>
</head>
<body></body>
</html>
